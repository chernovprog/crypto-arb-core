spring:
  # DATABASE
  datasource:
    hikari:
      leak-detection-threshold: ${DB_LEAK_THRESHOLD:30000}

  # ORM / Hibernate
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        use_sql_comments: false
        format_sql: false

logging:
  level:
    root: WARN
    com.achernov.cryptoarb: INFO
    org.springframework: ERROR

app:
  cookie:
    secure: true
