server:
  port: ${PORT:8080}

spring:
  application:
    name: crypto-arb-core
  web:
    error:
      whitelabel:
        enabled: false

  # DATABASE
  datasource:
    hikari:
      pool-name: ${HIKARI_POOL_NAME:Main-Hikari-Pool}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  # ORM / Hibernate
  jpa:
    properties:
      hibernate:
        default_schema: public

  # FLYWAY
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr([%X{traceId:-no-trace}]){faint} %clr([%-10.10X{exchange:-system}]){blue} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"

app:
  cookie:
    http-only: true
    same-site: Strict
  jwt:
    secret: ${JWT_SECRET}
    access:
      ttl: 15m
      cookie-name: accessToken
    refresh:
      ttl: 7d
      cookie-name: refreshToken
      cleanup-cron: "0 0 3 * * ?"
  integrations:
    enabled: true
    base-currency: [BTC, ETH, XRP, BNB, SOL]
    quote-currency: USDT
    providers:
      binance:
        exchange-name: Binance
        display-priority: 1
        enabled: true
        spot-market-url: wss://stream.binance.com:9443/ws
        topic-destination: /topic/binance/prices
        ping-interval: 3m
      bybit:
        exchange-name: Bybit
        display-priority: 2
        enabled: true
        spot-market-url: wss://stream.bybit.com/v5/public/spot
        topic-destination: /topic/bybit/prices
        ping-interval: 20s
      whitebit:
        exchange-name: WhiteBIT
        display-priority: 3
        enabled: true
        spot-market-url: wss://api.whitebit.com/ws
        topic-destination: /topic/whitebit/prices
        ping-interval: 50s
  external-services:
    coinmarketcap:
      enabled: true
      api:
        timeout:
          read: 10s
      base-url: https://pro-api.coinmarketcap.com/v1
      api-key: ${COINMARKETCAP_API_KEY}
      header-name: X-CMC_PRO_API_KEY
      quote-currency: USD
      pagination:
        start: 1
        limit: 100
      endpoints:
        listings: /cryptocurrency/listings/latest
